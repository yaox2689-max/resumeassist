id: "summary-generator"
prompt_template: "data/prompt/summary_generator.md"
llm:
  provider: "mimo"
  model: "mimo-v2.5-pro"
  temperature: 0.3
  fallback:
    provider: "mimo"
    model: "mimo-v2.5"
    temperature: 0.3
tools: []
skills: []
context:
  max_history_tokens: 100000
  compact_threshold: 80000
policy:
  max_steps: 5
  parallel_tools: 1
  tool_timeout: 30.0
